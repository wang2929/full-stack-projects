services:
  db:
    image: postgres:15
    container_name: demo-db
    env_file:
      - ./server/.env
    ports:
      - "5433:5432"
    volumes:
      - ./pgdata/:/var/lib/postgresql/data

  backend:
    build: ./server/
    image: back-img
    container_name: demo-back
    command: sh -c "gunicorn task_api.wsgi --bind 0.0.0.0:8000 --reload"
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    volumes:
      - ./server:/app
    depends_on:
      - db
  
  nginx:
    build: ./client/
    image: front-img
    container_name: demo-front
    ports:
      - "80:80"
    volumes:
        - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
        - ./client/dist:/usr/share/nginx/html
    depends_on:
      - backend